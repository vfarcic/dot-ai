<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ issuer }}</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Ubuntu, Cantarell, 'Noto Sans', sans-serif;
        background-color: #2D2D2D;
        color: #ffffff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .dex-navbar {
        background-color: #2D2D2D;
        border-bottom: 2px solid #FACB00;
        padding: 12px 24px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .dex-navbar img {
        max-height: 48px;
        width: auto;
      }

      .dex-container {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 16px;
      }

      .theme-panel {
        background-color: #383838;
        border: 1px solid #4a4a4a;
        border-radius: 8px;
        padding: 32px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
      }

      .theme-heading {
        color: #FACB00;
        font-size: 20px;
        font-weight: 600;
        margin: 0 0 24px 0;
        text-align: center;
      }

      .theme-form-row {
        margin-bottom: 16px;
      }

      .theme-form-row label {
        display: block;
        font-size: 14px;
        color: #cccccc;
        margin-bottom: 6px;
        font-weight: 500;
      }

      .theme-form-row input[type="text"],
      .theme-form-row input[type="password"],
      .theme-form-row input[type="email"] {
        width: 100%;
        padding: 10px 12px;
        font-size: 14px;
        background-color: #2D2D2D;
        border: 1px solid #555555;
        border-radius: 6px;
        color: #ffffff;
        outline: none;
        transition: border-color 0.2s ease;
      }

      .theme-form-row input:focus {
        border-color: #FACB00;
      }

      .dex-btn {
        display: inline-block;
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
        transition: background-color 0.2s ease, opacity 0.2s ease;
        width: 100%;
      }

      .dex-btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .dex-btn-theme-btn-success,
      .theme-btn-success {
        background-color: #FACB00;
        color: #2D2D2D;
      }

      .dex-btn-theme-btn-success:hover,
      .theme-btn-success:hover {
        background-color: #e1b700;
      }

      .dex-btn-icon {
        display: inline-block;
        width: 24px;
        height: 24px;
        margin-right: 8px;
        vertical-align: middle;
        border-radius: 4px;
        background-color: rgba(255, 255, 255, 0.15);
      }

      .dex-btn-text {
        vertical-align: middle;
        font-weight: 600;
        line-height: 24px;
      }

      a.dex-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px 16px;
        margin-bottom: 10px;
        background-color: #4a4a4a;
        color: #ffffff;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 600;
        transition: background-color 0.2s ease;
      }

      a.dex-btn:hover {
        background-color: #555555;
      }

      .dex-error-box {
        background-color: #c0392b;
        color: #ffffff;
        padding: 10px 14px;
        border-radius: 6px;
        margin-bottom: 16px;
        font-size: 14px;
      }

      .dex-subtle-text {
        font-size: 12px;
        color: #999999;
        margin-top: 16px;
        text-align: center;
      }

      .dex-subtle-text a {
        color: #FACB00;
        text-decoration: none;
      }

      .dex-subtle-text a:hover {
        text-decoration: underline;
      }

      .dex-separator {
        border: none;
        border-top: 1px solid #4a4a4a;
        margin: 20px 0;
      }

      .dex-list {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      .dex-list li {
        padding: 4px 0;
        font-size: 14px;
        color: #cccccc;
      }

      .theme-link-back {
        display: inline-block;
        margin-top: 12px;
        color: #FACB00;
        text-decoration: none;
        font-size: 14px;
      }

      .theme-link-back:hover {
        text-decoration: underline;
      }

      .theme-btn-cancel {
        background-color: #4a4a4a;
        color: #ffffff;
      }

      .theme-btn-cancel:hover {
        background-color: #555555;
      }

      .theme-btn-group {
        display: flex;
        gap: 12px;
        margin-top: 16px;
      }

      .theme-btn-group .dex-btn {
        flex: 1;
      }
    </style>
  </head>
