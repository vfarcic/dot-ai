name: CI Pipeline & Security

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ main ]
  workflow_dispatch:

# Restrict default permissions to read-only for security
permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read  # Required to checkout code
    outputs:
      secrets-available: ${{ steps.secrets-check.outputs.available }}

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        submodules: true

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '24.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Devbox
      uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
      with:
        enable-cache: true

    - name: Run linter
      run: devbox run -- npm run lint

    - name: Build project
      run: devbox run -- npm run build

    - name: Run unit tests
      run: npm run test:unit

    - name: Check if secrets are available
      id: secrets-check
      run: |
        if [ -n "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
          echo "available=true" >> $GITHUB_OUTPUT
        else
          echo "available=false" >> $GITHUB_OUTPUT
          echo "::warning::API keys not available - this is expected for PRs from forks. A maintainer can manually trigger tests using the 'Test Fork PR' workflow."
        fi

    - name: Build Docker images
      run: |
        npm pack
        docker build -t dot-ai:test .
        rm -f vfarcic-dot-ai-*.tgz
        (cd packages/agentic-tools && npm ci && npm run build && npm prune --omit=dev)
        docker build -t dot-ai-agentic-tools:test ./packages/agentic-tools
        docker save dot-ai:test -o /tmp/dot-ai-test.tar
        docker save dot-ai-agentic-tools:test -o /tmp/dot-ai-agentic-tools-test.tar

    - name: Upload Docker images
      if: steps.secrets-check.outputs.available == 'true'
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: docker-images
        path: |
          /tmp/dot-ai-test.tar
          /tmp/dot-ai-agentic-tools-test.tar
        retention-days: 1

    - name: Skip integration tests (fork PR)
      if: steps.secrets-check.outputs.available == 'false'
      run: |
        echo "::notice::Integration tests skipped - secrets not available for fork PRs"
        echo "A maintainer can manually run tests using: Actions → 'Test Fork PR (Manual)' → Run workflow"

  integration-test:
    name: integration-test (${{ matrix.name }})
    needs: build
    if: needs.build.outputs.secrets-available == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          # Tests needing optional infrastructure (separate clusters)
          - name: version
            tests: version
          - name: remediate
            tests: remediate
          - name: recommend
            tests: recommend
          - name: query
            tests: query
          - name: manage-org-data-policies-capabilities
            tests: manage-org-data-policies manage-org-data-capabilities
          # Base-only tests (grouped to share cluster setup overhead)
          - name: base-group-1
            tests: operate manage-org-data-patterns manage-knowledge auth rbac
          - name: base-group-2
            tests: resource-sync openapi plugin project-setup prompts
          # Isolated in its own group because its migration seed step recreates and then deletes the legacy `patterns` collection.
          - name: unified-knowledge-base
            tests: unified-knowledge-base

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        submodules: true

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '24.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Install Devbox
      uses: jetify-com/devbox-install-action@8c6a66ed6273138b1915457069de78cb52fe3bd7 # v0.15.0
      with:
        enable-cache: true

    - name: Download Docker images
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
      with:
        name: docker-images
        path: /tmp

    - name: Load Docker images
      run: |
        docker load -i /tmp/dot-ai-test.tar
        docker load -i /tmp/dot-ai-agentic-tools-test.tar

    - name: Run integration tests (${{ matrix.name }})
      run: devbox run -- ./tests/integration/infrastructure/run-integration-tests.sh ${{ matrix.tests }}
      timeout-minutes: 25
      env:
        SKIP_DOCKER_BUILD: "true"
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        DOT_AI_GIT_TOKEN: ${{ secrets.DOT_AI_GIT_TOKEN }}
        USE_LOCAL_EMBEDDINGS: "true"

  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read           # Required to checkout code
      security-events: write   # Required to upload CodeQL results

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        submodules: true

    - name: Initialize CodeQL
      uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4
      with:
        languages: typescript

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '24.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build project
      run: npm run build

    - name: Run dependency security audit
      run: npx --no-install better-npm-audit audit --level moderate

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4
