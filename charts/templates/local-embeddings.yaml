{{/*
Local Embedding Service (PRD #384)
Deploys HuggingFace Text Embeddings Inference (TEI) as an in-cluster embedding service.
Provides zero-config semantic search for users without embedding API keys.
*/}}
{{- if .Values.localEmbeddings.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-local-embeddings
  labels:
    {{- include "dot-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: local-embeddings
    app.kubernetes.io/part-of: dot-ai
  {{- $annotations := include "dot-ai.annotations" (dict "global" .Values.annotations "local" nil) -}}
  {{- if $annotations }}
  annotations:
    {{- $annotations | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: local-embeddings
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: local-embeddings
        app.kubernetes.io/instance: {{ .Release.Name }}
      {{- $podAnnotations := include "dot-ai.annotations" (dict "global" .Values.annotations "local" nil) -}}
      {{- if $podAnnotations }}
      annotations:
        {{- $podAnnotations | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.localEmbeddings.prefetch.enabled }}
      # TEI's built-in downloader cannot fetch models from HuggingFace's Xet storage
      # backend (it fails with "Header content-range is missing"). Prefetch the model
      # with a Xet-aware huggingface_hub client into a shared volume, then have TEI
      # load it from that local path with HF_HUB_OFFLINE=1 — so pod startup never
      # depends on TEI's own (incompatible) download path.
      initContainers:
      - name: model-prefetch
        image: {{ .Values.localEmbeddings.prefetch.image | quote }}
        env:
        - name: MODEL_ID
          value: {{ .Values.localEmbeddings.model | quote }}
        - name: HF_HUB_DISABLE_TELEMETRY
          value: "1"
        command: ["sh", "-c"]
        args:
        - |
          set -eu
          pip install --quiet --no-cache-dir 'huggingface_hub[hf_xet]'
          python - <<'PY'
          import os
          from huggingface_hub import snapshot_download
          snapshot_download(os.environ["MODEL_ID"], local_dir="/models/model")
          PY
        volumeMounts:
        - name: model-cache
          mountPath: /models
      {{- end }}
      containers:
      - name: local-embeddings
        image: "{{ .Values.localEmbeddings.image.repository }}:{{ .Values.localEmbeddings.image.tag }}"
        imagePullPolicy: IfNotPresent
        {{- if .Values.localEmbeddings.prefetch.enabled }}
        env:
        - name: HF_HUB_OFFLINE
          value: "1"
        {{- end }}
        args:
        - "--model-id"
        {{- if .Values.localEmbeddings.prefetch.enabled }}
        - "/models/model"
        {{- else }}
        - {{ .Values.localEmbeddings.model | quote }}
        {{- end }}
        - "--port"
        - "80"
        ports:
        - containerPort: 80
          name: http
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 80
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 5
        {{- if .Values.localEmbeddings.prefetch.enabled }}
        volumeMounts:
        - name: model-cache
          mountPath: /models
        {{- end }}
        {{- with .Values.localEmbeddings.resources }}
        resources:
          {{- toYaml . | nindent 10 }}
        {{- end }}
      {{- if .Values.localEmbeddings.prefetch.enabled }}
      volumes:
      - name: model-cache
        emptyDir: {}
      {{- end }}
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-local-embeddings
  labels:
    {{- include "dot-ai.labels" . | nindent 4 }}
    app.kubernetes.io/component: local-embeddings
    app.kubernetes.io/part-of: dot-ai
  {{- $svcAnnotations := include "dot-ai.annotations" (dict "global" .Values.annotations "local" nil) -}}
  {{- if $svcAnnotations }}
  annotations:
    {{- $svcAnnotations | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: local-embeddings
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
  - port: 80
    targetPort: 80
    protocol: TCP
    name: http
{{- end }}
