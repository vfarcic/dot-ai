{{/*
Dex secrets and configuration — auto-generated on first install, preserved on upgrade.

Creates three Secrets:
1. <fullname>-dex: stores plaintext admin password, client secret, JWT secret, bcrypt hash
   (referenced by deployment.yaml env vars; has helm.sh/resource-policy: keep)
2. dex: Dex config.yaml consumed by the Dex subchart (configSecret.name: dex)
3. dex-credentials: env-var-ready secret injected into the Dex pod via envFrom
   (key DEX_CLIENT_SECRET referenced by secretEnv in config.yaml)

The client secret is NOT embedded in the Dex config.yaml. Instead, config uses
secretEnv: DEX_CLIENT_SECRET, and the Dex pod reads DEX_CLIENT_SECRET from the
dex-credentials secret via envFrom. This keeps config content stable across
upgrades so routine Helm upgrades don't break OAuth.
*/}}
{{- if .Values.dex.enabled }}
{{- $secretName := printf "%s-dex" (include "dot-ai.fullname" .) }}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName }}
{{- $jwtSecret := "" }}
{{- $dexClientSecret := "" }}
{{- $adminPassword := "" }}
{{- $adminPasswordHash := "" }}
{{- if $existingSecret }}
  {{- $jwtSecret = index $existingSecret.data "jwt-secret" | b64dec }}
  {{- $dexClientSecret = index $existingSecret.data "dex-client-secret" | b64dec }}
  {{- $adminPassword = index $existingSecret.data "admin-password" | b64dec }}
  {{- if hasKey $existingSecret.data "admin-password-hash" }}
    {{- $adminPasswordHash = index $existingSecret.data "admin-password-hash" | b64dec }}
  {{- else }}
    {{- $adminPasswordHash = $adminPassword | bcrypt }}
  {{- end }}
{{- else }}
  {{- $jwtSecret = randAlphaNum 32 }}
  {{- $dexClientSecret = randAlphaNum 32 }}
  {{- $adminPassword = randAlphaNum 16 }}
  {{- $adminPasswordHash = $adminPassword | bcrypt }}
{{- end }}
{{- $dexExternalUrl := required "Dex issuer URL is required. Set .Values.dex.externalUrl or configure ingress/gateway hostnames." (include "dot-ai.dexExternalUrl" . | trim) }}
{{- $dotAiExternalUrl := required "dot-ai external URL is required. Set .Values.externalUrl or configure ingress/gateway hostnames." (include "dot-ai.externalUrl" . | trim) }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "dot-ai.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  jwt-secret: {{ $jwtSecret | quote }}
  dex-client-secret: {{ $dexClientSecret | quote }}
  admin-password: {{ $adminPassword | quote }}
  admin-password-hash: {{ $adminPasswordHash | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ default "dex" .Values.dex.configSecret.name }}
  labels:
    {{- include "dot-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  config.yaml: |
    issuer: {{ $dexExternalUrl }}
    frontend:
      dir: /srv/dex/web
      issuer: "DevOps AI Toolkit"
    storage:
      type: kubernetes
      config:
        inCluster: true
    enablePasswordDB: true
    oauth2:
      skipApprovalScreen: true
      responseTypes:
        - code
    staticClients:
      - id: dot-ai
        name: "dot-ai MCP Server"
        secretEnv: DEX_CLIENT_SECRET
        redirectURIs:
          - "{{ $dotAiExternalUrl }}/callback"
    staticPasswords:
      - email: "admin@dot-ai.local"
        hash: {{ $adminPasswordHash | quote }}
        username: "admin"
        userID: "00000000-0000-0000-0000-000000000001"
    {{- if .Values.dex.connectors }}
    connectors:
      {{- toYaml .Values.dex.connectors | nindent 6 }}
    {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: dex-credentials
  labels:
    {{- include "dot-ai.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  DEX_CLIENT_SECRET: {{ $dexClientSecret | quote }}
{{- end }}
